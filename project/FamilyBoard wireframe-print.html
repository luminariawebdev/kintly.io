<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FamilyBoard — wireframe (print)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body {
      margin: 0;
      background: #FFCF03;
      font-family: 'Instrument Sans', system-ui, sans-serif;
      color: #141414;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .print-stack {
      display: flex;
      flex-direction: column;
      gap: 40px;
      padding: 40px 0;
      align-items: center;
    }

    .print-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 402px;
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .print-page + .print-page {
      break-before: page;
      page-break-before: always;
    }

    .print-label {
      width: 100%;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #141414;
    }
    .print-label .num {
      font-weight: 600;
    }
    .print-label .title {
      flex: 1;
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      letter-spacing: -0.01em;
      text-transform: none;
      font-style: italic;
      font-weight: 400;
    }
    .print-label .meta { color: rgba(20,20,20,0.55); }

    @page {
      size: 5.5in 11in;
      margin: 0.4in;
    }

    @media print {
      html, body { background: #FFCF03; }
      .print-stack { gap: 0; padding: 0; }
      .print-page {
        margin: 0 auto;
        padding: 0;
      }
      /* No-op: the page-break rules above handle pagination. */
      .no-print { display: none !important; }
      /* The Tweaks-panel toolbar and shader canvas should not appear in print */
      .twk-panel, .twk-toggle { display: none !important; }
    }

    /* Hide the in-iframe Tweaks panel even in screen preview */
    .twk-panel, .twk-toggle { display: none !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    /* Defaults; print build has no live Tweaks panel but ShaderButton reads
       these defaults via ShaderContext. */
    window.__FB_TWEAK_DEFAULTS = {
      shaderOn: false, /* shader is animated — off for static print */
      shader: 'plasma',
      speed: 100,
      intensity: 100,
      alwaysOn: false,
      glow: false
    };
  </script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="shader-button.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens-auth.jsx"></script>
  <script type="text/babel" src="screens-main.jsx"></script>
  <script type="text/babel" src="screens-settings.jsx"></script>

  <script type="text/babel">
    const W = 402, H = 874;
    const F = ({ children }) => <IOSDevice width={W} height={H}>{children}</IOSDevice>;

    const PAGES = [
      { num: '01', title: 'Login',                 render: <F><LoginScreen /></F> },
      { num: '02', title: 'Login (error state)',   render: <F><LoginScreen showError /></F> },
      { num: '03', title: 'Join via invite',       render: <F><JoinGroupScreen /></F> },
      { num: '04', title: 'Main · Tasks',          render: <F><MainApp initialTab="tasks" /></F> },
      { num: '05', title: 'Main · Calendar',       render: <F><MainApp initialTab="calendar" initialScroll="calendar" /></F> },
      { num: '06', title: 'Main · Notes',          render: <F><MainApp initialTab="notes" initialScroll="notes" /></F> },
      { num: '07', title: 'Add task (modal)',      render: <F><MainApp initialTab="tasks" initialModal="task" /></F> },
      { num: '08', title: 'Add event (modal)',     render: <F><MainApp initialTab="calendar" initialScroll="calendar" initialModal="event" /></F> },
      { num: '09', title: 'Pin note (modal)',      render: <F><MainApp initialTab="notes" initialScroll="notes" initialModal="note" /></F> },
      { num: '10', title: 'Settings',              render: <F><SettingsScreen /></F> },
      { num: '11', title: 'Color picker open',     render: <F><SettingsScreen openSwatches /></F> },
    ];

    const PrintApp = () => (
      <ShaderProvider value={window.__FB_TWEAK_DEFAULTS}>
        <div className="print-stack">
          {PAGES.map(p => (
            <div className="print-page" key={p.num}>
              <div className="print-label">
                <span className="num">{p.num}</span>
                <span className="title">{p.title}</span>
                <span className="meta">FamilyBoard · wireframe</span>
              </div>
              {p.render}
            </div>
          ))}
        </div>
      </ShaderProvider>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp />);

    /* Auto-print: wait for fonts + JSX execution, then a small settle delay. */
    (async () => {
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (_) {}
      // Let React + nested useLayoutEffects (initialScroll) settle.
      await new Promise((r) => setTimeout(r, 800));
      window.print();
    })();
  </script>
</body>
</html>
